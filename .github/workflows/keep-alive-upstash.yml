name: Upstash Redis Keep-Alive

on:
  schedule:
    # 大约每5天触发一次（内部再随机决定是否真的执行）
    - cron: '15 3 */5 * *'     # UTC 03:15，每5天左右

  workflow_dispatch:           # 支持手动触发测试

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6           # 已更新到 v6（支持 Node.js 24，避免弃用警告）

      # ────────────────────────────────────────────────
      #  随机决定本次是否真的 ping（模拟平均 5~6 天一次）
      # ────────────────────────────────────────────────
      - name: Decide whether to ping this time
        id: should_ping
        run: |
          # 生成 0~9 的随机数
          RAND=$((RANDOM % 10))

          if [ $RAND -le 4 ]; then
            # 0~4 → 执行（约 50% 概率）
            # 配合 */5 调度 → 实际平均约 5.5~6.2 天一次
            echo "should_ping=true" >> $GITHUB_OUTPUT
            echo "Decision: YES - will ping Redis"
          else
            echo "should_ping=false" >> $GITHUB_OUTPUT
            echo "Decision: NO - skip this time"
          fi

      # ────────────────────────────────────────────────
      #  随机睡眠 10~180 秒，分散请求时间，避免集中打到 Upstash
      # ────────────────────────────────────────────────
      - name: Random sleep (10–180 seconds)
        if: steps.should_ping.outputs.should_ping == 'true'
        run: |
          SLEEP_TIME=$((10 + RANDOM % 171))
          echo "Sleeping for ${SLEEP_TIME} seconds to spread load..."
          sleep $SLEEP_TIME

      # ────────────────────────────────────────────────
      #  执行一次简单的 PING（零写操作，最省资源）
      # ────────────────────────────────────────────────
      - name: Ping Upstash Redis
        if: steps.should_ping.outputs.should_ping == 'true'
        env:
          UPSTASH_URL:   ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          if [ -z "$UPSTASH_URL" ] || [ -z "$UPSTASH_TOKEN" ]; then
            echo "Error: Missing UPSTASH_REDIS_REST_URL or UPSTASH_REDIS_REST_TOKEN secret"
            exit 1
          fi

          # 使用 REST API 发送 PING 命令（最轻量保活方式）
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $UPSTASH_TOKEN" \
            "$UPSTASH_URL/ping")

          if [ "$RESPONSE" = "200" ]; then
            echo "Ping successful (HTTP 200)"
          else
            echo "Ping failed - HTTP status: $RESPONSE"
            exit 1
          fi

          # 可选：如果你更偏好写操作，可以替换上面为：
          # curl -s -H "Authorization: Bearer $UPSTASH_TOKEN" \
          #   "$UPSTASH_URL/set/gh-keepalive/$(date +%s)/1?EX=86400" \
          #   && echo "SET keep-alive OK" || { echo "SET failed"; exit 1; }
