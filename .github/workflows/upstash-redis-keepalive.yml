      - name: Keep-alive + full debug
        env:
          URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          set -x   # print commands as executed

          echo "URL length  = ${#URL}"
          echo "Token length = ${#TOKEN}"
          echo "Full URL     = $URL"

          if [ ${#URL} -lt 10 ] || [ ${#TOKEN} -lt 20 ]; then
            echo "ERROR: secrets look invalid — check repository secrets"
            exit 2
          fi

          echo "→ Sending PING at $(date -u)"
          curl -v --max-time 45 --fail-with-body \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            --data-binary '"PING"' \
            "$URL" > curl_output.txt 2>&1 || true

          cat curl_output.txt
          echo "← Finished at $(date -u)"

          # Optional: try the /ping convenience endpoint too
          echo "Trying convenience /ping endpoint..."
          curl -v --max-time 30 \
            -H "Authorization: Bearer $TOKEN" \
            "$URL/ping" || true
